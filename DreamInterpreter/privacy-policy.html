<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Privacy Policy - DreamInterpreter</title>
  <style>
    body { font-family: system-ui, sans-serif; line-height: 1.5; max-width: 42rem; margin: 0 auto; padding: 1rem 1.25rem; color: #1a1a1a; }
    a { color: #0b57d0; }
    #content hr { border: none; border-top: 1px solid #e0e0e0; margin: 1.5rem 0; }
    #content ul { padding-left: 1.25rem; }
    .error { color: #b00020; }
  </style>
</head>
<body>
  <div id="content">Loading…</div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (function () {
      var el = document.getElementById('content');
      var mdUrl = 'docs/PRIVACY_POLICY.md';
      fetch(mdUrl)
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.text();
        })
        .then(function (text) {
          el.innerHTML = marked.parse(text);
        })
        .catch(function () {
          el.innerHTML = '<p class="error">Could not load policy. <a href="' + mdUrl + '">Open markdown source</a>.</p>';
        });
    })();
  </script>
</body>
</html>
